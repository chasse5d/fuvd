            </div>
        </div>
    </div>
<script>
    let slides = document.querySelectorAll('.slide');
    let current = 0;
    function showSlide(index) {
        slides.forEach((slide, i) => {
            slide.classList.toggle('active', i === index);
        });
    }
    setInterval(() => {
        current = (current + 1) % slides.length;
        showSlide(current);
    }, 5000);
    showSlide(current);
</script>
